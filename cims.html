<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>corAe Studio – CIMS</title>

  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .layout { display:grid; grid-template-columns:260px 1fr; gap:12px; }
    .sidebar { background:#0f1420; border:1px solid #1c2430; border-radius:12px; padding:10px; }
    .search { width:100%; padding:.55rem .7rem; background:#0b0f14; border:1px solid #283244; border-radius:8px; color:#c7d8ef; }
    .contact { padding:.5rem .6rem; border-radius:8px; cursor:pointer; display:flex; gap:.6rem; align-items:center; }
    .contact:hover { background:#101724; }
    .contact.active { background:#131b2a; border:1px solid #263248; }
    .avatar { width:28px; height:28px; border-radius:50%; background:#192132; display:inline-grid; place-items:center; color:#9bb0c9; font-size:.8rem; }
    .tag { font-size:.7rem; padding:.1rem .35rem; border-radius:.4rem; border:1px solid #2a3a52; color:#9bb0c9; }
    .main { background:#0f1420; border:1px solid #1c2430; border-radius:12px; padding:0; display:grid; grid-template-rows:auto 1fr auto; }
    .thread-header { padding:12px 14px; border-bottom:1px solid #1c2430; display:flex; align-items:center; justify-content:space-between; }
    .thread { padding:14px; overflow:auto; max-height:58vh; }
    .bubble { max-width:70%; margin:8px 0; padding:.6rem .75rem; border-radius:12px; color:#e6f0ff; }
    .me { background:#7c5cff22; border:1px solid #7c5cff55; margin-left:auto; }
    .them { background:#111a28; border:1px solid #223049; margin-right:auto; }
    .meta { font-size:.72rem; color:#9bb0c9; margin-top:.25rem; }
    .composer { display:grid; grid-template-columns:auto 1fr auto; gap:8px; padding:10px; border-top:1px solid #1c2430; }
    select, .input { background:#0b0f14; border:1px solid #283244; color:#c7d8ef; border-radius:8px; padding:.55rem .7rem; }
    .send { background:#7c5cff; color:#fff; border:none; border-radius:10px; padding:.6rem 1rem; cursor:pointer; }
    .empty { color:#8395ad; text-align:center; padding:36px 10px; }
  </style>
</head>
<body>
  <div id="app-header" class="header">
    <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center">
      <img src="https://dummyimage.com/28x28/7c5cff/ffffff&text=Æ" alt="corAe" width="28" height="28" style="border-radius:8px;"/>
      <div style="font-weight:700;margin-left:.5rem">corAe Studio</div>
    </a>
    <span class="badge" style="margin-left:.5rem">CIMS</span>
  </div>

  <div class="container">
    <div class="card" style="margin-bottom:12px">
      <h1>Communications Hub (CIMS)</h1>
      <p>Route and manage messages across Internal, WhatsApp, and Email. This page uses local storage now; later we switch to real providers.</p>
    </div>

    <div class="layout">
      <!-- Sidebar: contacts + search -->
      <aside class="sidebar">
        <input id="search" class="search" placeholder="Search contacts…" />
        <div id="contacts" style="margin-top:10px"></div>
      </aside>

      <!-- Main: thread + composer -->
      <section class="main">
        <div class="thread-header">
          <div id="thread-title" style="display:flex;align-items:center;gap:.6rem">
            <div class="avatar">?</div>
            <div>
              <div id="contact-name" style="font-weight:700">Select a contact</div>
              <div id="contact-meta" class="meta">Channel —</div>
            </div>
          </div>
          <div>
            <span id="channel-badge" class="tag">—</span>
          </div>
        </div>

        <div id="thread" class="thread">
          <div class="empty">No conversation selected.</div>
        </div>

        <div class="composer">
          <select id="channel">
            <option value="internal">Internal</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="email">Email</option>
          </select>
          <input id="message" class="input" placeholder="Type a message…" />
          <button id="send" class="send">Send</button>
        </div>
      </section>
    </div>
  </div>

  <div class="footer">© corAe Studio</div>

  <script defer src="js/core.js"></script>
  <script>
    // --- Storage keys
    const K_CONTACTS = 'corAe.cims.contacts';
    const K_MSGS     = 'corAe.cims.messages'; // { [contactId]: [ {text, ts, from, channel} ] }

    // --- Seed if empty
    function seedIfEmpty(){
      if(!localStorage.getItem(K_CONTACTS)){
        const contacts = [
          { id:'ops1',  name:'Operations Desk', channel:'internal' },
          { id:'wmgr1', name:'WhatsApp Manager', channel:'whatsapp' },
          { id:'acct1', name:'Accounts (Email)', channel:'email' }
        ];
        localStorage.setItem(K_CONTACTS, JSON.stringify(contacts));
      }
      if(!localStorage.getItem(K_MSGS)){
        const now = Date.now();
        const msgs = {
          'ops1':  [
            { text:'Morning standup at 9:30.', ts: now-3600_000, from:'them', channel:'internal' },
            { text:'Roger that. Agenda set.',   ts: now-3500_000, from:'me',   channel:'internal' }
          ],
          'wmgr1': [
            { text:'Please confirm promo copy.', ts: now-7200_000, from:'them', channel:'whatsapp' }
          ],
          'acct1': [
            { text:'Invoice #284 due tomorrow.', ts: now-5400_000, from:'them', channel:'email' }
          ]
        };
        localStorage.setItem(K_MSGS, JSON.stringify(msgs));
      }
    }

    // --- Helpers
    const $ = sel => document.querySelector(sel);
    const el = id => document.getElementById(id);
    const fmt = ts => new Date(ts).toLocaleString();

    // --- UI elements
    const contactsEl = el('contacts');
    const searchEl   = el('search');
    const threadEl   = el('thread');
    const nameEl     = el('contact-name');
    const metaEl     = el('contact-meta');
    const badgeEl    = el('channel-badge');
    const channelEl  = el('channel');
    const msgEl      = el('message');
    const sendBtn    = el('send');

    // --- State
    let contacts = [];
    let messages = {};
    let currentId = null;

    function load(){
      contacts = JSON.parse(localStorage.getItem(K_CONTACTS) || '[]');
      messages = JSON.parse(localStorage.getItem(K_MSGS) || '{}');
    }
    function saveMsgs(){ localStorage.setItem(K_MSGS, JSON.stringify(messages)); }

    function renderContacts(filter=''){
      contactsEl.innerHTML = '';
      const q = filter.trim().toLowerCase();
      contacts
        .filter(c => !q || c.name.toLowerCase().includes(q))
        .forEach(c => {
          const div = document.createElement('div');
          div.className = 'contact' + (c.id===currentId ? ' active' : '');
          div.dataset.id = c.id;
          div.innerHTML = `
            <div class="avatar">${c.name[0] ?? '?'}</div>
            <div>
              <div style="font-weight:600">${c.name}</div>
              <div class="meta">${c.channel}</div>
            </div>
          `;
          div.addEventListener('click', () => openThread(c.id));
          contactsEl.appendChild(div);
        });
    }

    function openThread(id){
      currentId = id;
      const c = contacts.find(x => x.id===id);
      // header
      nameEl.textContent = c.name;
      metaEl.textContent = `Preferred channel: ${c.channel}`;
      badgeEl.textContent = c.channel;
      // composer defaults
      channelEl.value = c.channel;

      // thread
      const msgs = messages[id] || [];
      threadEl.innerHTML = '';
      if(!msgs.length){
        threadEl.innerHTML = '<div class="empty">No messages yet. Say hello 👋</div>';
      } else {
        msgs.forEach(m => {
          const b = document.createElement('div');
          b.className = `bubble ${m.from==='me' ? 'me' : 'them'}`;
          b.innerHTML = `
            <div>${m.text}</div>
            <div class="meta">${m.channel} • ${fmt(m.ts)}</div>
          `;
          threadEl.appendChild(b);
        });
        threadEl.scrollTop = threadEl.scrollHeight;
      }
      renderContacts(searchEl.value);
    }

    function send(){
      if(!currentId) return alert('Select a contact first.');
      const text = msgEl.value.trim();
      if(!text) return;
      const ch = channelEl.value;
      const arr = messages[currentId] = messages[currentId] || [];
      arr.push({ text, ts: Date.now(), from:'me', channel: ch });
      saveMsgs();
      msgEl.value = '';
      openThread(currentId);
    }

    // --- Wire
    seedIfEmpty();
    load();
    renderContacts();
    searchEl.addEventListener('input', e => renderContacts(e.target.value));
    sendBtn.addEventListener('click', send);
    msgEl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); send(); } });

    // Auto-open first contact on first load
    if(contacts[0]) openThread(contacts[0].id);
  </script>
</body>
</html>
