i<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>corAe Continuum</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      /* lightweight defaults so it looks tidy even without styles.css */
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      h1, h2 { margin: 0 0 8px; }
      .muted { color:#666; }
      .row { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0 22px; }
      .btn { border:1px solid #ccc; background:#f8f8f8; padding:8px 12px; border-radius:8px; cursor:pointer; }
      .btn:active { transform: translateY(1px); }
      #task-list > .item { padding:8px 10px; border:1px solid #eee; border-radius:8px; margin:8px 0; }
      #status { min-height: 20px; margin-top: 8px; color:#0a7; }
      a { color:#246; }
    </style>
  </head>
  <body>
    <header>
      <div class="muted">AE</div>
      <h1>corAe <strong>Continuum</strong></h1>
      <div class="muted">Just Ride</div>
    </header>

    <main>
      <h2>Continuum Feed</h2>
      <p class="muted">One flow. Work + Home. Press a button, move forward — no stalls.</p>

      <div class="row">
        <button class="btn" id="btn-focus">Today’s Focus</button>
        <button class="btn" id="btn-diagnostics">Diagnostics</button>
        <a class="btn" href="/cims.html">Open CIMS</a>
      </div>

      <div id="status"></div>

      <section style="margin-top:24px;">
        <h3>Tasks (API)</h3>
        <div id="task-list" aria-live="polite"></div>
      </section>
    </main>

    <script src="/js/scripts.js" defer></script>
  </body>
</html>
