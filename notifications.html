<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>corAe Studio – Notifications</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .notif-item {
      padding:.7rem;
      margin-bottom:.5rem;
      border-radius:6px;
      background:#0f1722;
      border:1px solid #1e2a38;
    }
    .notif-time {
      font-size:.85rem;
      color:#8899aa;
      margin-top:.2rem;
    }
  </style>
</head>
<body>

  <div id="app-header" class="header">
    <a href="index.html" style="color:inherit;text-decoration:none;display:flex;align-items:center">
      <img src="https://dummyimage.com/28x28/7c5cff/ffffff&text=Æ" alt="corAe" width="28" height="28" style="border-radius:8px;"/>
      <div style="font-weight:700;margin-left:.5rem">corAe Studio</div>
    </a>
    <span class="badge" style="margin-left:.5rem">Notifications</span>
  </div>

  <div class="container">
    <div class="card">
      <h1>Notifications</h1>
      <p>View and manage all system notifications. These are generated by the Notification Engine and routed via CIMS, Email, or WhatsApp depending on your settings.</p>
    </div>

    <div class="card">
      <div id="notifications-list"></div>
    </div>
  </div>

  <div class="footer">© corAe Studio</div>

  <!-- Scripts -->
  <script defer src="js/core.js"></script>
  <script defer>
    const notifKey = 'corAe.notifications';

    // Simulate fetching notifications from local storage
    const loadNotifications = () => {
      const list = document.getElementById('notifications-list');
      const notifs = JSON.parse(localStorage.getItem(notifKey) || '[]');

      list.innerHTML = '';

      if (!notifs.length) {
        list.innerHTML = '<p style="color:#8899aa">No notifications yet.</p>';
        return;
      }

      notifs.forEach(n => {
        const div = document.createElement('div');
        div.className = 'notif-item';
        div.innerHTML = `
          <div>${n.message}</div>
          <div class="notif-time">${new Date(n.time).toLocaleString()}</div>
        `;
        list.appendChild(div);
      });
    };

    // Example: Seed with some notifications if empty
    if (!localStorage.getItem(notifKey)) {
      const seed = [
        {message: 'Task "Vendor Confirmation" is due in 2 hours.', time: Date.now() - 3600000},
        {message: 'CIMS message received from Finance Manager.', time: Date.now() - 7200000},
        {message: 'System update completed successfully.', time: Date.now() - 10800000}
      ];
      localStorage.setItem(notifKey, JSON.stringify(seed));
    }

    loadNotifications();
  </script>
</body>
</html>
